<figure><img src="01_phasing_tradeoff.svg" alt="Co-orbital phasing: Δv vs catch-up time"/><figcaption><b>Co-orbital phasing: Δv vs catch-up time</b><br>Closing a co-orbital gap is cheap if you can wait — Δv falls with every extra orbit. The 6 h suit-clock and a 400 m/s budget bound the feasible corner (lower-left).</figcaption></figure><figure><img src="02_intercept_curve.svg" alt="Cross-orbit intercept: the Δv floor & speed penalty"/><figcaption><b>Cross-orbit intercept: the Δv floor & speed penalty</b><br>A buoy on a different orbit (600 km higher) can't beat the Hohmann Δv floor, and arriving faster costs Δv steeply — a luxury rescue, hopeless on a short clock.</figcaption></figure><figure><img src="03_reachability_heatmap.svg" alt="Reachability map: cheapest rescue Δv"/><figcaption><b>Reachability map: cheapest rescue Δv</b><br>The coverage map. For each phase gap (x) and life-support clock (y), the cheapest co-orbital rescue Δv. Grey = unreachable in time at any Δv. Coverage is cheap toward the top-left.</figcaption></figure><figure><img src="04_period_floor.svg" alt="The phasing time-floor scales with orbit"/><figcaption><b>The phasing time-floor scales with orbit</b><br>Phasing can't beat one orbital period. Where the curve rises above the 6 h clock (past ~MEO), short-clock phasing rescue is impossible — at NRHO the period is ~6.5 days (off-chart).</figcaption></figure><figure><img src="05_boiloff.svg" alt="Passive storage: what survives in a dormant cache"/><figcaption><b>Passive storage: what survives in a dormant cache</b><br>Tank remaining over a year. Hydrogen is gone in ~100 days; storables, water, and gas are effectively permanent — which is why a fire-and-forget cache holds those.</figcaption></figure><figure><img src="06_solar_power.svg" alt="Solar power falls off as 1/r²"/><figcaption><b>Solar power falls off as 1/r²</b><br>Sunlight as a percent of Earth's. Past the asteroid belt, active cooling (and just staying alive) means nuclear, not solar.</figcaption></figure><figure><img src="07_failure_modes.svg" alt="Failure modes by life-support clock"/><figcaption><b>Failure modes by life-support clock</b><br>Each emergency's time-to-loss-of-crew, by category. The short-clock modes (fire, depress, radiation) drive the need for close/formation responders; long-clock ones tolerate slow recovery rigs.</figcaption></figure><figure><img src="08_coverage_by_regime.svg" alt="Where coverage is strong vs weak"/><figcaption><b>Where coverage is strong vs weak</b><br>Reachable co-orbital arc vs clock, by orbit. LEO covers the whole ring in hours; GEO covers nothing until the clock exceeds ~a day. The staircase is period-quantization.</figcaption></figure><figure><img src="09_program_cost.svg" alt="Phase-1 program cost (ISS + Tiangong)"/><figcaption><b>Phase-1 program cost (ISS + Tiangong)</b><br>Order-of-magnitude cost for the two currently-crewed stations. Lean ≈ $1B (formation refuges only); Full ≈ $3B (echeloned network). Dominated by stage-1 units and development.</figcaption></figure><figure><img src="10_lifeboats_per_launch.svg" alt="Lifeboats per Starship launch"/><figcaption><b>Lifeboats per Starship launch</b><br>Recovery vehicles per Starship (~100 t, ~1000 m³). Refuges and reentry vehicles are mass-limited. One Starship of reentry lifeboats (~24 seats) exceeds the entire current in-orbit population (10).</figcaption></figure><figure><img src="11_launch_cost_by_vehicle.svg" alt="Launch cost of the fleet by vehicle"/><figcaption><b>Launch cost of the fleet by vehicle</b><br>Launch cost of the Phase-1 fleet (~81 t) by vehicle. Starship cuts the launch line to near-noise and carries the whole fleet in 1–2 flights vs ~5 on Falcon 9.</figcaption></figure>
